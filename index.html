<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSpace Lessons — Архив уроков Frontend</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --accent: #17b198;
            --bg: #0d0f1a;
            --bg-card: #131620;
            --border: #23263a;
            --text: #dde1f0;
            --text-muted: #8b90aa;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        header {
            background: linear-gradient(135deg, #0f2420, #0a1219);
            border-bottom: 1px solid var(--border);
            padding: 60px 24px 50px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(23,177,152,0.18), transparent 70%);
        }
        .badge {
            display: inline-block;
            background: rgba(23,177,152,0.12);
            border: 1px solid rgba(23,177,152,0.3);
            color: var(--accent);
            padding: 6px 18px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        h1 { font-size: clamp(28px, 5vw, 48px); font-weight: 800; color: #fff; margin-bottom: 10px; }
        h1 span { color: var(--accent); }
        .sub { font-size: 15px; color: var(--text-muted); }
        .container { max-width: 800px; margin: 0 auto; padding: 48px 20px; }
        .section-title { font-size: 12px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--accent); margin-bottom: 20px; }
        .lesson-list { display: grid; gap: 14px; }
        .lesson-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px 24px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 18px;
            transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
        }
        .lesson-card:hover {
            border-color: rgba(23,177,152,0.4);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
        .lesson-num {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: rgba(23,177,152,0.12);
            border: 1px solid rgba(23,177,152,0.25);
            color: var(--accent);
            font-size: 16px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .lesson-info h2 { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 4px; }
        .lesson-info p { font-size: 12px; color: var(--text-muted); }
        .lesson-arrow { margin-left: auto; color: var(--accent); font-size: 20px; opacity: 0.5; }
        footer { text-align: center; padding: 24px; font-size: 12px; color: #5a5f7a; border-top: 1px solid var(--border); }
        footer a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
<header>
    <div class="badge">🎓 c 0 до оффера · Frontend</div>
    <h1>Skill<span>Space</span> Lessons</h1>
    <p class="sub">Архив уроков курса HTML, CSS, JS, REACT</p>
</header>
<div class="container">
    <div class="section-title">📚 Уроки</div>
    <div class="lesson-list">
        <a class="lesson-card" href="lessons/21-validaciya-dannyh/">
            <div class="lesson-num">21</div>
            <div class="lesson-info">
                <h2>Валидация данных</h2>
                <p>Zod · Yup · React Hook Form · Formik · TypeScript</p>
            </div>
            <div class="lesson-arrow">→</div>
        </a>
    </div>
</div>
<footer>
    <a href="https://fd74c5.skillspace.ru/">SkillSpace</a> · Архив уроков ·
    <a href="https://github.com/arturflant-hub/skillspace-lessons">GitHub</a>
</footer>
</body>
</html>
